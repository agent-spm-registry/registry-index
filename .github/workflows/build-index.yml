name: Build SPM Skill Index

on:
  schedule:
    - cron: '*/10 * * * *'
  repository_dispatch:
    types: [skill_updated]
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch and Aggregate Skills
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Initialize an empty JSON array
          echo "[]" > registry-index.json
          
          # 2. Get all public repositories in your organization
          # Note: If your org is NOT named 'agent-spm-registry', change it below!
          REPOS=$(gh repo list agent-spm-registry --public --limit 1000 --json name -q '.[].name')
          
          for repo in $REPOS; do
            echo "Checking $repo for spm.json..."
            
            # 3. Try to fetch the spm.json directly from the main branch
            HTTP_CODE=$(curl -s -w "%{http_code}" -o temp.json "https://raw.githubusercontent.com/agent-spm-registry/$repo/main/spm.json")
            
            # 4. If the file exists (HTTP 200), add it to our array
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Found spm.json in $repo! Adding to registry..."
              
              # This jq command safely merges the new JSON into our main array.
              # It handles both single skills (objects) and grouped skills (arrays)!
              jq -s '.[0] + (.[1] | if type=="array" then . else [.] end)' registry-index.json temp.json > temp-registry.json
              mv temp-registry.json registry-index.json
            else
              echo "No spm.json found in $repo."
            fi
          done
          
          # Clean up
          rm -f temp.json
          
          echo "Successfully generated registry-index.json!"

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . 

  deploy:
    needs: build-index
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
